# ==========================================
# Ground Station MQTT Broker Configuration
# ==========================================

# 1. 允許匿名登入 (不需要帳號密碼)
allow_anonymous true

# 2. 建立標準 MQTT TCP 監聽埠 (供 Python 後端使用)
listener 1883 0.0.0.0

# 3. 建立 WebSockets 監聽埠 (供 React 前端使用)
listener 9001 0.0.0.0
protocol websockets
